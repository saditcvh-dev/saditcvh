<div
  class="flex px-6 gap-6 mt-4 justify-between items-center transition-all duration-300 ease-in-out header-container"
  [class.header-border]="showMainHeader">


	<!-- Contenedor para los tabs (a la izquierda) -->
	<div class="flex gap-6">
		<!-- Vista PNG -->
		<button *ngIf="shouldShowTab('preview-png')" (click)="onTabClick('preview-png')"
			[class.border-[#691831]]="activeTab === 'preview-png'" [class.text-[#691831]]="activeTab === 'preview-png'"
			class="pb-3 text-sm font-medium border-b-[3px] border-transparent text-gray-500 hover:text-gray-700 transition-colors flex items-center gap-1">
			<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
				<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
					d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
			</svg> Vista PNG
		</button>

		<!-- Vista PDF -->
		<button *ngIf="shouldShowTab('preview-pdf')" (click)="onTabClick('preview-pdf')"
			[class.border-[#691831]]="activeTab === 'preview-pdf'" [class.text-[#691831]]="activeTab === 'preview-pdf'"
			class="pb-3 text-sm font-medium border-b-[3px] border-transparent text-gray-500 hover:text-gray-700 transition-colors flex items-center gap-1">
			<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
				<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
					d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 2H7a2 2 0 00-2 2v15a2 2 0 002 2z" />
			</svg> Vista PDF
		</button>

		<!-- Metadatos -->
		<button *ngIf="shouldShowTab('metadata')" (click)="onTabClick('metadata')"
			[class.border-[#691831]]="activeTab === 'metadata'" [class.text-[#691831]]="activeTab === 'metadata'"
			class="pb-3 text-sm font-medium border-b-[3px] border-transparent text-gray-500 hover:text-gray-700 transition-colors">
			Metadatos
		</button>

		<!-- Seguridad -->
		<!-- <button *ngIf="shouldShowTab('security')" (click)="onTabClick('security')"
			[class.border-[#691831]]="activeTab === 'security'" [class.text-[#691831]]="activeTab === 'security'"
			class="pb-3 text-sm font-medium border-b-[3px] border-transparent text-gray-500 hover:text-gray-700 transition-colors flex items-center gap-1">
			<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
				<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
					d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
			</svg> Seguridad
		</button> -->

		<!-- Historial -->
		<button *ngIf="shouldShowTab('history')" (click)="onTabClick('history')"
			[class.border-[#691831]]="activeTab === 'history'" [class.text-[#691831]]="activeTab === 'history'"
			class="pb-3 text-sm font-medium border-b-[3px] border-transparent text-gray-500 hover:text-gray-700 transition-colors flex items-center gap-1">
			<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
				<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
					d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
			</svg> Historial
		</button>

		<!-- Búsqueda OCR -->
		<button *ngIf="shouldShowTab('ocr-search')" (click)="onTabClick('ocr-search')"
			[class.border-[#691831]]="activeTab === 'ocr-search'" [class.text-[#691831]]="activeTab === 'ocr-search'"
			class="pb-3 text-sm font-medium border-b-[3px] border-transparent text-gray-500 hover:text-gray-700 transition-colors flex items-center gap-1">
			<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
				<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
					d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
			</svg> Búsqueda
		</button>

		<!-- Acciones Adicionales -->
		<button *ngIf="shouldShowTab('additional-actions')" (click)="onTabClick('additional-actions')"
			[class.border-[#691831]]="activeTab === 'additional-actions'" [class.text-[#691831]]="activeTab === 'additional-actions'"
			class="pb-3 text-sm font-medium border-b-[3px] border-transparent text-gray-500 hover:text-gray-700 transition-colors flex items-center gap-1">
			<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
				<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
					d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" />
			</svg> Acciones
		</button>
	</div>


	<span
		class="text-[10px] uppercase font-bold text-gray-400 dark:text-neutral-400 border border-gray-200 dark:border-neutral-600 px-2 py-0.5 rounded flex items-center">

		<button (click)="toggleMainHeader()"
			class="opacity-40 hover:opacity-100 transition-all duration-300 ease-in-out"
			title="Mostrar / Ocultar encabezado">

			<svg class="w-4 h-4 transition-transform duration-300 ease-in-out" [class.rotate-180]="!showMainHeader"
				fill="none" stroke="currentColor" viewBox="0 0 24 24">

				<!-- Flecha vertical -->
				<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
			</svg>

		</button>
	</span>

</div>
